name: Build & Deploy to DOKS

on:
  push:
    branches: [main]

jobs:
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ghcr.io/saiteja02806/likeluclaw-backend:latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/saiteja02806/likeluclaw-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ghcr.io/saiteja02806/likeluclaw-frontend:latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ghcr.io/saiteja02806/likeluclaw-frontend:latest
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
            VITE_API_URL=https://likelyclaw.com
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to DOKS
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Write kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" | base64 -d > /tmp/kc.yaml

      - name: Create GHCR pull secret on cluster
        run: |
          kubectl --kubeconfig=/tmp/kc.yaml create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            -n claw-system \
            --dry-run=client -o yaml | kubectl --kubeconfig=/tmp/kc.yaml apply -f -
          kubectl --kubeconfig=/tmp/kc.yaml create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            -n claw-agents \
            --dry-run=client -o yaml | kubectl --kubeconfig=/tmp/kc.yaml apply -f -

      - name: Apply namespaces and agent manifests
        run: |
          kubectl --kubeconfig=/tmp/kc.yaml apply -f k8s/namespaces.yaml

      - name: Deploy backend
        run: |
          kubectl --kubeconfig=/tmp/kc.yaml apply -f k8s/backend.yaml
          kubectl --kubeconfig=/tmp/kc.yaml patch deployment claw-backend -n claw-system \
            -p '{"spec":{"template":{"spec":{"imagePullSecrets":[{"name":"ghcr-pull-secret"}]}}}}'
          kubectl --kubeconfig=/tmp/kc.yaml rollout restart deployment/claw-backend -n claw-system
          kubectl --kubeconfig=/tmp/kc.yaml rollout status deployment/claw-backend -n claw-system --timeout=120s

      - name: Deploy frontend (production image)
        run: |
          kubectl --kubeconfig=/tmp/kc.yaml apply -f k8s/frontend-production.yaml
          kubectl --kubeconfig=/tmp/kc.yaml rollout status deployment/claw-frontend -n claw-system --timeout=60s

      - name: Apply Ingress + cert-manager
        run: |
          kubectl --kubeconfig=/tmp/kc.yaml apply -f k8s/cert-issuer.yaml
          kubectl --kubeconfig=/tmp/kc.yaml apply -f k8s/ingress.yaml

      - name: Verify health
        run: |
          sleep 10
          curl -sf https://likelyclaw.com/api/health || echo "Backend not yet healthy (TLS may still be provisioning)"
