# Applied by GitHub Actions after building ghcr.io/phioranex/claw-frontend:latest
# Replaces the nginx:alpine + kubectl-cp bootstrap deployment with a self-contained image
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claw-frontend
  namespace: claw-system
  labels:
    app: claw-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claw-frontend
  template:
    metadata:
      labels:
        app: claw-frontend
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: nginx
          image: ghcr.io/saiteja02806/likeluclaw-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
