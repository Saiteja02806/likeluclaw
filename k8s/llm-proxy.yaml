apiVersion: apps/v1
kind: Deployment
metadata:
  name: claw-llm-proxy
  namespace: claw-system
  labels:
    app: claw-llm-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claw-llm-proxy
  template:
    metadata:
      labels:
        app: claw-llm-proxy
    spec:
      containers:
        - name: llm-proxy
          image: ghcr.io/phioranex/claw-llm-proxy:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3100
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3100
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: claw-llm-proxy
  namespace: claw-system
  labels:
    app: claw-llm-proxy
spec:
  selector:
    app: claw-llm-proxy
  ports:
    - protocol: TCP
      port: 3100
      targetPort: 3100
  type: ClusterIP
