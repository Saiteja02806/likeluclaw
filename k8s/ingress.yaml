apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: claw-main-ingress
  namespace: claw-system
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "330"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "330"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/enable-websockets: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - likelyclaw.com
        - www.likelyclaw.com
      secretName: likelyclaw-tls
  rules:
    - host: likelyclaw.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: claw-backend
                port:
                  number: 3000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: claw-backend
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: claw-frontend
                port:
                  number: 80
    - host: www.likelyclaw.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: claw-frontend
                port:
                  number: 80
