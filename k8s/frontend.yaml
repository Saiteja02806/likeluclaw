apiVersion: apps/v1
kind: Deployment
metadata:
  name: claw-frontend
  namespace: claw-system
  labels:
    app: claw-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claw-frontend
  template:
    metadata:
      labels:
        app: claw-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/phioranex/claw-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: claw-frontend
  namespace: claw-system
  labels:
    app: claw-frontend
spec:
  selector:
    app: claw-frontend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: claw-frontend-ingress
  namespace: claw-system
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - likelyclaw.com
      secretName: likelyclaw-tls
  rules:
    - host: likelyclaw.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: claw-frontend
                port:
                  number: 80
