# DO NOT COMMIT WITH REAL VALUES — replace placeholders before applying
# Apply with: kubectl apply -f secrets.yaml (keep the real file out of git)
apiVersion: v1
kind: Secret
metadata:
  name: claw-backend-secrets
  namespace: claw-system
type: Opaque
stringData:
  supabase-url: "https://YOUR_PROJECT.supabase.co"
  supabase-anon-key: "YOUR_ANON_KEY"
  supabase-service-role-key: "YOUR_SERVICE_ROLE_KEY"
  encryption-key: "YOUR_32_BYTE_HEX_KEY"
  razorpay-key-id: "rzp_live_XXXX"
  razorpay-key-secret: "YOUR_RAZORPAY_SECRET"
  razorpay-webhook-secret: "YOUR_WEBHOOK_SECRET"
  composio-api-key: "YOUR_COMPOSIO_API_KEY"
